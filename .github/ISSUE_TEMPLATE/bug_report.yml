name: Bug Report
description: Report a bug in taskprim, stateprim, knowledgeprim, or queueprim
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - taskprim CLI
        - taskprim API
        - taskprim MCP
        - stateprim CLI
        - stateprim API
        - stateprim MCP
        - knowledgeprim CLI
        - knowledgeprim API
        - knowledgeprim MCP
        - queueprim CLI
        - queueprim API
        - queueprim MCP
        - primkit (shared library)
        - Replication (Litestream)
        - Configuration
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the issue...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `taskprim add "test" --list demo`
        2. Run `taskprim list --list demo`
        3. See error...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include Go version, OS, and primkit version.
      placeholder: |
        - OS: macOS 15.2 / Ubuntu 24.04 / etc.
        - Go: 1.22.5
        - primitive version: v0.1.0 (or commit hash)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error messages, stack traces, or relevant output.
      render: shell
