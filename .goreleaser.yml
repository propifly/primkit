version: 2

before:
  hooks:
    - go mod tidy -C primkit
    - go mod tidy -C taskprim
    - go mod tidy -C stateprim

builds:
  - id: taskprim
    dir: taskprim
    main: ./cmd/taskprim
    binary: taskprim
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: stateprim
    dir: stateprim
    main: ./cmd/stateprim
    binary: stateprim
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: taskprim
    builds: [taskprim]
    name_template: "taskprim_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

  - id: stateprim
    builds: [stateprim]
    name_template: "stateprim_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
