version: 2

builds:
  - id: taskprim
    dir: taskprim
    main: ./cmd/taskprim
    binary: taskprim
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: stateprim
    dir: stateprim
    main: ./cmd/stateprim
    binary: stateprim
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: knowledgeprim
    dir: knowledgeprim
    main: ./cmd/knowledgeprim
    binary: knowledgeprim
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: taskprim
    ids: [taskprim]
    name_template: "taskprim_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  - id: stateprim
    ids: [stateprim]
    name_template: "stateprim_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  - id: knowledgeprim
    ids: [knowledgeprim]
    name_template: "knowledgeprim_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

release:
  header: |
    See [CHANGELOG.md](https://github.com/propifly/primkit/blob/main/CHANGELOG.md) for details.
